server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://node1-control:3100/loki/api/v1/push

scrape_configs:
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system-logs
          host: HOSTNAME_PLACEHOLDER
          __path__: /var/log/*.log

  - job_name: mini-dc-results
    static_configs:
      - targets:
          - localhost
        labels:
          job: mini-dc-results
          host: HOSTNAME_PLACEHOLDER
          __path__: /tmp/mini-dc-logs/*.csv

  - job_name: container-logs
    pipeline_stages:
      - docker: {}
    static_configs:
      - targets:
          - localhost
        labels:
          job: container-logs
          host: HOSTNAME_PLACEHOLDER
          __path__: /var/lib/docker/containers/*/*-json.log
