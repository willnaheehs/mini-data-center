global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporters
    static_configs:
      - targets:
          - node1-control:9100
          - node2-worker:9100
          - node3-worker:9100
        labels:
          cluster: mini-data-center

  - job_name: pushgateway
    static_configs:
      - targets:
          - pushgateway:9091
        labels:
          cluster: mini-data-center
          component: dispatcher-metrics

  # Worker metrics are exposed via NodePort so host-based Prometheus can scrape
  # the worker nodes directly from outside Kubernetes.
  - job_name: mini-dc-workers
    static_configs:
      - targets:
          - node2-worker:30082
          - node3-worker:30083
        labels:
          cluster: mini-data-center
          component: worker-metrics

  # Optional future targets:
  # - kube-state-metrics
  # - cadvisor
  # - redis exporter
